version: '3.8'

services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blog_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"

  test_runner:
    build: .
    environment:
      DATABASE_HOST: postgres_test
      DATABASE_PORT: 5432
      DATABASE_NAME: blog_test
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: password
      NODE_ENV: test
    depends_on:
      - postgres_test
    command: make test